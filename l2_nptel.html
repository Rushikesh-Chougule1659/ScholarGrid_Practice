<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NPTEL Courses</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark-mode");
        }
    </script>
</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="main_course.html">Courses</a>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </nav>

    <h1>Select NPTEL Course</h1>

    <div class="search-container" style="margin-bottom: 30px; display: flex; justify-content: center; width: 100%;">
        <input type="text" id="course-search" placeholder="Search courses (e.g. Operating System)..." onkeypress="handleSearchKeyPress(event)" style="padding: 12px 20px; width: 60%; max-width: 500px; border-radius: 8px 0 0 8px; font-size: 16px; background: var(--card-bg); color: var(--text-color); border: 1px solid var(--button-bg); outline: none; box-shadow: 0 4px 10px var(--shadow);">
        <button onclick="searchCourses()" class="search-btn" style="margin: 0; padding: 12px 24px; border-radius: 0 8px 8px 0; background: var(--button-bg); color: white; border: 1px solid var(--button-bg); cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,119,255,0.25);">Search</button>
    </div>

    <div class="course-list" id="courseList">
        <div class="course-card" data-category="Elective">
            <h3>Soft Skills</h3>
            <p>Improve your communication and interpersonal skills.</p>
            <a href="l3_course_dashboard.html?subject=soft_skills"><button>Go to Course</button></a>
        </div>
        <div class="course-card" data-category="Core">
            <h3>Operating System</h3>
            <p>Learn core concepts of modern operating systems.</p>
            <a href="l3_course_dashboard.html?subject=os"><button>Go to Course</button></a>
        </div>
        <div class="course-card" data-category="Core">
            <h3>Computer Networks</h3>
            <p>Understand networking layers and protocols.</p>
            <a href="l3_course_dashboard.html?subject=cn"><button>Go to Course</button></a>
        </div>
        <div class="course-card" data-category="Core">
            <h3>Enhancing Materology</h3>
            <p>Study the advanced concepts of Materology.</p>
            <a href="l3_course_dashboard.html?subject=enhancing_materology"><button>Go to Course</button></a>
        </div>
    </div>
    
    <script src="script.js"></script>

</body>

</html>
