<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Dashboard</title>
    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark-mode");
        }
    </script>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="main_course.html">Courses</a>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </nav>
    
    <section>
        <h1 id="course-title">Loading Course...</h1>
        <p id="high-score-display" style="text-align: center; color: var(--button-bg); font-weight: bold; margin-bottom: 20px; font-size: 1.1rem; display: none;"></p>
        
        <div style="display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap;">
            <a id="material-link" href="#" target="_blank"><button>📺 See Material (YouTube)</button></a>
            <a id="mock-link" href="#"><button class="stop-btn">⏱ Give Mock test (50 random MCQs)</button></a>
        </div>
        
        <h2>Practice Sets (No Timer)</h2>
        <div id="practice-sets" class="course-list">
            <!-- Dynamic sets injected here -->
        </div>
        
        <br>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; flex-wrap: wrap; gap: 15px;">
            <a href="l2_nptel.html"><button style="background: var(--nav-bg); color: var(--text-color); border: 1px solid var(--border);">← Back to NPTEL Courses</button></a>
            <button onclick="resetProgress()" style="background: transparent; color: #dc3545; border: 1px solid #dc3545;">🗑 Reset Progress</button>
        </div>
    </section>

    <!-- JS Link -->
    <script src="script.js"></script>
    <script src="l3_course_dashboard.js"></script>
</body>
</html>
